<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tạo QR menu — Juice Shop</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<style>
  body{font-family:system-ui,Segoe UI,Arial,sans-serif;max-width:560px;margin:40px auto;padding:0 16px;color:#111;}
  h1{font-size:20px;} input{width:100%;padding:10px;font-size:15px;box-sizing:border-box;margin:8px 0;}
  button{padding:10px 16px;font-size:15px;cursor:pointer;} #qr{margin:20px 0;} #qr img{width:280px;height:280px;image-rendering:pixelated;}
  .muted{color:#666;font-size:13px;}
</style>
</head>
<body>
  <h1>Tạo QR cho menu đặt nước</h1>
  <p class="muted">Dán URL menu (vd <code>https://user.github.io/juice-menu/</code>), bấm Tạo QR, rồi lưu ảnh để in dán tại quán.</p>
  <input id="url" placeholder="https://user.github.io/juice-menu/">
  <button onclick="gen()">Tạo QR</button>
  <button onclick="dl()">Tải ảnh PNG</button>
  <div id="qr"></div>
  <div class="muted" id="shown"></div>
<script>
  function gen(){
    const url = document.getElementById('url').value.trim();
    if(!url){ alert('Nhập URL menu.'); return; }
    const qr = qrcode(0,'M'); qr.addData(url); qr.make();
    document.getElementById('qr').innerHTML = qr.createImgTag(8, 12);
    document.getElementById('shown').textContent = url;
  }
  function dl(){
    const img = document.querySelector('#qr img');
    if(!img){ alert('Tạo QR trước.'); return; }
    const a = document.createElement('a'); a.href = img.src; a.download = 'menu-qr.png'; a.click();
  }
</script>
</body>
</html>
