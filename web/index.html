<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Đặt nước ép</title>
<style>
  /* ---------- Design tokens ----------
     Brand: quán nước ép trái cây tươi.
     Palette lấy cảm hứng từ cùi cam / lá bạc hà / giấy kraft cốc.
       ink      #23281F  chữ chính (xanh rêu gần đen)
       pulp     #F26B1D  cam cùi ép (accent hành động)
       leaf     #4E7C3A  xanh lá bạc hà (phụ)
       cream    #FBF7EF  nền giấy
       peel     #FFE7C2  nền card nhạt
  */
  :root{
    --ink:#23281F; --pulp:#F26B1D; --pulp-dk:#D9560F;
    --leaf:#4E7C3A; --cream:#FBF7EF; --peel:#FFF1DD;
    --line:#E7DDC9; --muted:#8A8574; --white:#fff;
    --radius:16px; --radius-sm:10px;
    --shadow:0 6px 24px rgba(35,40,31,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:var(--cream); color:var(--ink);
    padding-bottom:96px; line-height:1.4;
  }

  /* ---------- Header ---------- */
  header{
    background:linear-gradient(135deg,var(--pulp),#F59A3C);
    color:#fff; padding:26px 20px 22px; position:relative; overflow:hidden;
  }
  header h1{margin:0;font-size:26px;font-weight:800;letter-spacing:.3px}
  header p{margin:6px 0 0;font-size:14px;opacity:.92}
  header .blob{position:absolute;right:-30px;top:-30px;width:140px;height:140px;
    background:rgba(255,255,255,.14);border-radius:50%}

  /* ---------- Menu ---------- */
  main{max-width:640px;margin:0 auto;padding:16px 14px 0}
  .status{padding:20px;text-align:center;color:var(--muted);font-size:14px}
  .status.error{color:var(--pulp-dk)}

  .cat-title{font-size:13px;font-weight:700;text-transform:uppercase;
    letter-spacing:1px;color:var(--leaf);margin:18px 4px 8px}

  .card{
    background:var(--white);border:1px solid var(--line);border-radius:var(--radius);
    display:flex;gap:12px;padding:12px;margin-bottom:10px;align-items:center;
    box-shadow:0 1px 3px rgba(35,40,31,.04);
  }
  .card img{width:76px;height:76px;border-radius:12px;object-fit:cover;
    background:var(--peel);flex-shrink:0}
  .card .noimg{width:76px;height:76px;border-radius:12px;background:var(--peel);
    flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:30px}
  .card .info{flex:1;min-width:0}
  .card .name{font-weight:700;font-size:15px;margin:0 0 3px}
  .card .desc{font-size:12px;color:var(--muted);margin:0 0 6px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .price{font-weight:800;color:var(--pulp-dk);font-size:15px}

  /* stepper */
  .step{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .step button{
    width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;
    font-size:20px;font-weight:700;line-height:1;display:flex;align-items:center;
    justify-content:center;transition:transform .08s;
  }
  .step button:active{transform:scale(.9)}
  .step .minus{background:var(--peel);color:var(--pulp-dk)}
  .step .plus{background:var(--pulp);color:#fff}
  .step .qty{min-width:20px;text-align:center;font-weight:800;font-size:16px}
  .add-btn{
    background:var(--pulp);color:#fff;border:none;border-radius:20px;
    padding:9px 16px;font-weight:700;font-size:14px;cursor:pointer;transition:transform .08s;
  }
  .add-btn:active{transform:scale(.94)}

  /* ---------- Cart bar ---------- */
  .cartbar{
    position:fixed;left:0;right:0;bottom:0;background:var(--ink);color:#fff;
    padding:14px 18px;display:flex;align-items:center;justify-content:space-between;
    transform:translateY(120%);transition:transform .25s;z-index:40;
  }
  .cartbar.show{transform:translateY(0)}
  .cartbar .sum{font-size:13px;opacity:.8}
  .cartbar .tot{font-size:18px;font-weight:800}
  .cartbar button{
    background:var(--pulp);color:#fff;border:none;border-radius:24px;
    padding:12px 22px;font-weight:800;font-size:15px;cursor:pointer;
  }

  /* ---------- Sheet (cart + checkout) ---------- */
  .overlay{position:fixed;inset:0;background:rgba(35,40,31,.5);z-index:50;
    opacity:0;pointer-events:none;transition:opacity .2s}
  .overlay.show{opacity:1;pointer-events:auto}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;max-width:640px;margin:0 auto;
    background:var(--cream);border-radius:22px 22px 0 0;z-index:60;
    transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.9,.3,1);
    max-height:90vh;display:flex;flex-direction:column;
  }
  .sheet.show{transform:translateY(0)}
  .sheet .grab{width:40px;height:4px;background:var(--line);border-radius:2px;
    margin:10px auto 4px}
  .sheet h2{margin:6px 20px 12px;font-size:20px;font-weight:800}
  #sheetContent{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;overflow:hidden}
  .sheet .body{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px 20px}

  .line{display:flex;justify-content:space-between;align-items:center;
    padding:12px 0;border-bottom:1px solid var(--line)}
  .line .l-name{font-weight:700;font-size:14px}
  .line .l-price{font-size:12px;color:var(--muted)}
  .line .l-right{display:flex;align-items:center;gap:10px}

  label{display:block;font-size:13px;font-weight:700;margin:14px 0 5px}
  input,textarea{
    width:100%;padding:12px;border:1px solid var(--line);border-radius:var(--radius-sm);
    font-size:15px;font-family:inherit;background:#fff;color:var(--ink);
  }
  input:focus,textarea:focus{outline:2px solid var(--pulp);border-color:transparent}
  textarea{resize:vertical;min-height:60px}

  .submit{
    width:100%;background:var(--pulp);color:#fff;border:none;border-radius:14px;
    padding:16px;font-size:17px;font-weight:800;margin-top:18px;cursor:pointer;
  }
  .submit:disabled{opacity:.5}

  .done{text-align:center;padding:30px 20px}
  .done .big{font-size:56px;margin-bottom:8px}
  .done h3{margin:0 0 6px;font-size:22px}
  .done p{color:var(--muted);margin:0 0 20px}
  .done .oid{display:inline-block;background:var(--peel);color:var(--pulp-dk);
    font-weight:800;padding:6px 14px;border-radius:20px;margin-bottom:16px}

  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="blob"></div>
  <a href="track.html" style="position:absolute;right:16px;top:18px;color:#fff;background:rgba(255,255,255,.20);padding:7px 12px;border-radius:20px;text-decoration:none;font-size:13px;font-weight:700;z-index:2">🔎 Theo dõi đơn</a>
  <h1>Nước Ép Tươi 🍊</h1>
  <p>Chọn món, để lại thông tin — quán xác nhận và làm ngay.</p>
</header>

<main>
  <div id="menu"><div class="status">Đang tải thực đơn…</div></div>
</main>

<!-- Cart bar -->
<div class="cartbar" id="cartbar">
  <div>
    <div class="sum" id="cartSum">0 món</div>
    <div class="tot" id="cartTot">0đ</div>
  </div>
  <button onclick="openSheet()">Xem giỏ →</button>
</div>

<!-- Sheet -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <div id="sheetContent"></div>
</div>

<script src="config.js"></script>
<script>
/* ====================================================================
   CẤU HÌNH — đọc từ config.js (window.CONFIG). Fallback nếu thiếu.
   ==================================================================== */
const CONFIG = window.CONFIG || {
  BASE_URL: "https://your-erpnext-site.com",
  ITEM_GROUP: "Nước Ép",
  PRICE_LIST: "Standard Selling",
  MENU_MODE: "method",
  CREATE_METHOD: "juice.create_order",
  MENU_METHOD: "juice.get_menu",
  TRACK_METHOD: "pos_next.api.webshop.get_order_status"
};

/* ====================================================================
   STATE
   ==================================================================== */
let cart = {};      // { item_code: {item, qty} }
let items = [];     // danh sách món

const fmt = n => new Intl.NumberFormat('vi-VN').format(Math.round(n)) + 'đ';

/* ====================================================================
   1. TẢI THỰC ĐƠN từ ERPNext (đọc động qua REST API, quyền Guest)
   ==================================================================== */
async function loadMenu(){
  const menuEl = document.getElementById('menu');
  try{
    if((CONFIG.MENU_MODE || "method") === "method"){
      // Cách an toàn: gọi server script juice.get_menu (đã lọc + kèm giá)
      const res = await fetch(`${CONFIG.BASE_URL}/api/method/${CONFIG.MENU_METHOD}`,
        {headers:{'Accept':'application/json'}});
      if(!res.ok) throw new Error('HTTP '+res.status);
      const data = await res.json();
      items = data.message || [];
    }else{
      // Cách direct: đọc thẳng Item (cần mở quyền Guest)
      const filters = [["disabled","=",0],["is_sales_item","=",1]];
      if(CONFIG.ITEM_GROUP) filters.push(["item_group","=",CONFIG.ITEM_GROUP]);
      const fields = ["item_code","item_name","description","image","item_group","standard_rate"];
      const url = `${CONFIG.BASE_URL}/api/resource/Item?`
        + `fields=${encodeURIComponent(JSON.stringify(fields))}`
        + `&filters=${encodeURIComponent(JSON.stringify(filters))}`
        + `&limit_page_length=0`;
      const res = await fetch(url, {headers:{'Accept':'application/json'}});
      if(!res.ok) throw new Error('HTTP '+res.status);
      items = (await res.json()).data || [];
      await attachPrices();
    }

    if(items.length === 0){
      menuEl.innerHTML = '<div class="status">Chưa có món nào trong thực đơn.</div>';
      return;
    }
    renderMenu();
  }catch(err){
    menuEl.innerHTML = `<div class="status error">Không tải được thực đơn.<br>${err.message}
      <br><small>Kiểm tra BASE_URL, CORS và quyền Guest đọc Item.</small></div>`;
  }
}

async function attachPrices(){
  try{
    const codes = items.map(i=>i.item_code);
    const filters = [["price_list","=",CONFIG.PRICE_LIST],["item_code","in",codes]];
    const fields = ["item_code","price_list_rate"];
    const url = `${CONFIG.BASE_URL}/api/resource/Item Price?`
      + `fields=${encodeURIComponent(JSON.stringify(fields))}`
      + `&filters=${encodeURIComponent(JSON.stringify(filters))}`
      + `&limit_page_length=0`;
    const res = await fetch(url,{headers:{'Accept':'application/json'}});
    if(res.ok){
      const map = {};
      (await res.json()).data.forEach(p=>map[p.item_code]=p.price_list_rate);
      items.forEach(i=>{ i.price = map[i.item_code] ?? i.standard_rate ?? 0; });
    }else{
      items.forEach(i=> i.price = i.standard_rate ?? 0);
    }
  }catch{
    items.forEach(i=> i.price = i.standard_rate ?? 0);
  }
}

/* ====================================================================
   2. RENDER MENU (gom nhóm theo Item Group)
   ==================================================================== */
function renderMenu(){
  const groups = {};
  items.forEach(i=>{ (groups[i.item_group] ??= []).push(i); });

  let html = '';
  for(const [g, list] of Object.entries(groups)){
    html += `<div class="cat-title">${g}</div>`;
    list.forEach(i=>{
      const q = cart[i.item_code]?.qty || 0;
      const img = i.image
        ? `<img src="${CONFIG.BASE_URL}${i.image}" alt="" onerror="this.replaceWith(mkNoImg())">`
        : `<div class="noimg">🥤</div>`;
      html += `
      <div class="card">
        ${img}
        <div class="info">
          <p class="name">${i.item_name}</p>
          ${i.description ? `<p class="desc">${stripHtml(i.description)}</p>`:''}
          <span class="price">${fmt(i.price)}</span>
        </div>
        ${ q>0
          ? `<div class="step">
               <button class="minus" onclick="dec('${i.item_code}')">−</button>
               <span class="qty" id="q-${cssId(i.item_code)}">${q}</span>
               <button class="plus" onclick="inc('${i.item_code}')">+</button>
             </div>`
          : `<button class="add-btn" onclick="inc('${i.item_code}')">Thêm</button>` }
      </div>`;
    });
  }
  document.getElementById('menu').innerHTML = html;
}

function mkNoImg(){const d=document.createElement('div');d.className='noimg';d.textContent='🥤';return d;}
const stripHtml = s => (s||'').replace(/<[^>]*>/g,'').trim();
const cssId = s => s.replace(/[^a-zA-Z0-9]/g,'_');

/* ====================================================================
   3. GIỎ HÀNG
   ==================================================================== */
function inc(code){
  const it = items.find(i=>i.item_code===code);
  cart[code] ??= {item:it, qty:0, notes:[]};
  cart[code].qty++;
  cart[code].notes.push('');          // thêm 1 cốc → 1 ô ghi chú riêng
  renderMenu(); updateCartBar(); refreshSheetIfOpen();
}
function dec(code){
  if(!cart[code]) return;
  cart[code].qty--;
  cart[code].notes.pop();
  if(cart[code].qty<=0) delete cart[code];
  renderMenu(); updateCartBar(); refreshSheetIfOpen();
}

/* Ghi chú theo TỪNG CỐC */
const CHIPS = ['Ít đá','Không đá','Nhiều đá','Ít đường','Không đường','Bình thường'];
const escAttr = s => (s||'').replace(/[&"<>]/g,c=>({'&':'&amp;','"':'&quot;','<':'&lt;','>':'&gt;'}[c]));
function setNote(code, idx, val){ if(cart[code]) cart[code].notes[idx] = val; }
function toggleChip(code, idx, text){
  if(!cart[code]) return;
  let tokens = (cart[code].notes[idx]||'').split(',').map(s=>s.trim()).filter(Boolean);
  const p = tokens.indexOf(text);
  if(p>=0) tokens.splice(p,1); else tokens.push(text);
  cart[code].notes[idx] = tokens.join(', ');
  renderSheet();
}

/* Hình thức nhận hàng */
let fulfillmentMode = 'delivery';   // 'delivery' | 'pickup'
function setFulfill(m){ fulfillmentMode = m; renderSheet(); }

function cartArray(){ return Object.values(cart); }
function cartCount(){ return cartArray().reduce((s,c)=>s+c.qty,0); }
function cartTotal(){ return cartArray().reduce((s,c)=>s+c.qty*c.item.price,0); }

function updateCartBar(){
  const bar = document.getElementById('cartbar');
  const n = cartCount();
  if(n>0){
    bar.classList.add('show');
    document.getElementById('cartSum').textContent = n+' món';
    document.getElementById('cartTot').textContent = fmt(cartTotal());
  }else{
    bar.classList.remove('show');
    closeSheet();
  }
}

/* ====================================================================
   4. SHEET: giỏ + form khách
   ==================================================================== */
function openSheet(){
  renderSheet();
  document.getElementById('overlay').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}
function closeSheet(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
}
function refreshSheetIfOpen(){
  if(document.getElementById('sheet').classList.contains('show')) renderSheet();
}

function renderSheet(){
  const lines = cartArray().map(c=>{
    const cups = Array.from({length:c.qty}, (_,i)=>{
      const val = c.notes[i] || '';
      const tokens = val.split(',').map(s=>s.trim()).filter(Boolean);
      const chips = CHIPS.map(t=>{
        const on = tokens.includes(t);
        return `<button type="button" class="chip${on?' on':''}" onclick="toggleChip('${c.item.item_code}',${i},'${t}')">${t}</button>`;
      }).join('');
      return `
        <div class="cup">
          <div class="cup-top">🥤 Cốc ${i+1}${c.qty>1?` / ${c.qty}`:''}</div>
          <div class="chips">${chips}</div>
          <input class="cup-note" placeholder="Ghi chú riêng cốc này…" value="${escAttr(val)}"
                 oninput="setNote('${c.item.item_code}',${i},this.value)">
        </div>`;
    }).join('');
    return `
    <div class="line">
      <div class="l-head">
        <div>
          <div class="l-name">${c.item.item_name}</div>
          <div class="l-price">${fmt(c.item.price)} × ${c.qty}</div>
        </div>
        <div class="l-right">
          <div class="step">
            <button class="minus" onclick="dec('${c.item.item_code}')">−</button>
            <span class="qty">${c.qty}</span>
            <button class="plus" onclick="inc('${c.item.item_code}')">+</button>
          </div>
          <strong>${fmt(c.qty*c.item.price)}</strong>
        </div>
      </div>
      <div class="cups">${cups}</div>
    </div>`;
  }).join('');

  document.getElementById('sheetContent').innerHTML = `
    <style>
      .l-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
      .cups{margin:8px 0 4px;display:flex;flex-direction:column;gap:8px}
      .cup{background:rgba(0,0,0,.03);border:1px solid var(--line,#eee);border-radius:12px;padding:9px 10px}
      .cup-top{font-size:12px;color:var(--muted,#8a8a8a);margin-bottom:7px;font-weight:700}
      .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:7px}
      .chip{font-size:12.5px;padding:6px 11px;border-radius:999px;border:1px solid var(--line,#ddd);background:#fff;color:#333;cursor:pointer;line-height:1}
      .chip.on{background:var(--pulp,#f59e0b);border-color:var(--pulp,#f59e0b);color:#fff}
      .cup-note{width:100%;padding:8px 10px;border:1px solid var(--line,#ddd);border-radius:9px;font-size:13px;box-sizing:border-box}
    </style>
    <h2>Giỏ của bạn</h2>
    <div class="body">
      ${lines || '<p style="color:var(--muted)">Giỏ trống</p>'}
      <div class="line" style="border:none">
        <strong>Tổng cộng</strong>
        <strong style="color:var(--pulp-dk);font-size:18px">${fmt(cartTotal())}</strong>
      </div>

      <label>Hình thức nhận</label>
      <div class="chips" style="margin-bottom:12px">
        <button type="button" class="chip${fulfillmentMode==='delivery'?' on':''}" onclick="setFulfill('delivery')">🛵 Giao tận nơi</button>
        <button type="button" class="chip${fulfillmentMode==='pickup'?' on':''}" onclick="setFulfill('pickup')">🏪 Tới quán lấy</button>
      </div>

      <label>Họ tên *</label>
      <input id="f-name" placeholder="Nguyễn Văn A" value="${getVal('f-name')}">
      <label>Số điện thoại *</label>
      <input id="f-phone" type="tel" inputmode="numeric" placeholder="09xx xxx xxx" value="${getVal('f-phone')}">
      ${fulfillmentMode==='delivery' ? `<label>Địa chỉ giao *</label>
      <textarea id="f-addr" placeholder="Số nhà, đường, phường/xã…">${getVal('f-addr')}</textarea>` : ''}
      <label>Ghi chú chung cả đơn (tuỳ chọn)</label>
      <textarea id="f-note" placeholder="vd: giao trước 17h, gọi trước khi tới…">${getVal('f-note')}</textarea>

      <button class="submit" id="submitBtn" onclick="submitOrder()">
        Gửi đơn • ${fmt(cartTotal())}
      </button>
    </div>`;
}
// giữ lại giá trị đang gõ khi sheet re-render
const _form = {};
function getVal(id){ return _form[id] || ''; }
document.addEventListener('input', e=>{ if(e.target.id?.startsWith('f-')) _form[e.target.id]=e.target.value; });

/* ====================================================================
   5. GỬI ĐƠN → tạo Sales Order Draft qua Server Script (Guest)
   ==================================================================== */
async function submitOrder(){
  const name = (_form['f-name']||'').trim();
  const phone= (_form['f-phone']||'').trim();
  const isPickup = fulfillmentMode === 'pickup';
  const addr = isPickup ? '' : (_form['f-addr']||'').trim();
  const note = (_form['f-note']||'').trim();

  if(!name || !phone){ alert('Vui lòng nhập Họ tên và SĐT.'); return; }
  if(!isPickup && !addr){ alert('Giao tận nơi cần nhập Địa chỉ.'); return; }
  if(cartCount()===0){ alert('Giỏ đang trống.'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Đang gửi…';

  // Mỗi CỐC = 1 dòng qty:1 kèm ghi chú riêng của cốc đó
  const orderItems = [];
  cartArray().forEach(c=>{
    for(let i=0;i<c.qty;i++){
      orderItems.push({ item_code:c.item.item_code, qty:1, note:(c.notes[i]||'').trim() });
    }
  });

  const payload = {
    customer_name: name,
    phone: phone,
    address: addr,
    note: note,          // ghi chú chung cả đơn
    fulfillment: isPickup ? 'pickup' : 'delivery',
    items: orderItems
  };

  try{
    const res = await fetch(`${CONFIG.BASE_URL}/api/method/${CONFIG.CREATE_METHOD}`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.exception || data._server_messages || ('HTTP '+res.status));

    const oid = data.message?.order_id || data.message?.name || '—';
    showDone(oid);
    cart = {}; Object.keys(_form).forEach(k=>delete _form[k]);
    updateCartBar();
  }catch(err){
    btn.disabled=false; btn.textContent='Thử lại';
    alert('Gửi đơn thất bại: '+err.message);
  }
}

function showDone(oid){
  document.getElementById('sheetContent').innerHTML = `
    <div class="done">
      <div class="big">✅</div>
      <h3>Đã gửi đơn!</h3>
      <div class="oid">Mã đơn: ${oid}</div>
      <p>Quán sẽ gọi xác nhận qua số bạn để lại.<br>Cảm ơn bạn 🍊</p>
      <a class="submit" style="display:block;text-decoration:none;margin-bottom:10px" href="track.html?order=${encodeURIComponent(oid)}">🔎 Theo dõi đơn này</a>
      <button class="submit" style="background:var(--peel);color:var(--pulp-dk)" onclick="closeSheet();renderMenu()">Đặt món khác</button>
    </div>`;
}

/* ---------- init ---------- */
loadMenu();
</script>
</body>
