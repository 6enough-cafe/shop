name: Deploy web menu to GitHub Pages

# Deploy noi dung thu muc web/ len GitHub Pages.
# Pages source phai chon: Settings -> Pages -> Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "print-console/index.html"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # Ban don web (Order Station) -> /shop/station/. config.local.js (chua API key)
      # da bi .gitignore nen KHONG bao gio co trong repo/artifact.
      - name: Assemble station page
        run: |
          mkdir -p web/station
          cp print-console/index.html web/station/index.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
